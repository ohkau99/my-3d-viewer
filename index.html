<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>3D NIfTI Viewer (Stable)</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; overflow: hidden; }
        header { padding: 15px; background: #111; border-bottom: 1px solid #333; height: 70px; box-sizing: border-box; }
        #status { color: #0ff; font-size: 13px; margin-top: 5px; }
        #container { width: 100vw; height: calc(100vh - 70px); background: #050505; }
        canvas { width: 100%; height: 100%; }
        .btn { background: #00bcd4; color: black; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

<header>
    <label class="btn">
        NIfTI 파일 선택
        <input type="file" id="file-input" style="display:none" accept=".nii,.gz">
    </label>
    <div id="status">라이브러리 연결 시도 중...</div>
</header>

<div id="container">
    <canvas id="gl"></canvas>
</div>

<!-- 첫 번째 라이브러리 시도 (jsDelivr) -->
<script src="https://cdn.jsdelivr.net/npm/@niivue/niivue@0.41.1/dist/niivue.umd.js" 
        onerror="this.src='https://unpkg.com/@niivue/niivue@0.41.1/dist/niivue.umd.js'"></script>

<script>
    let nv;

    function startEngine() {
        const status = document.getElementById('status');
        
        // niivue 로드 확인
        if (typeof niivue === 'undefined') {
            status.innerHTML = "<span style='color:red'>모든 서버에서 라이브러리 로드 실패. 브라우저를 새로고침(F5) 해주세요.</span>";
            return;
        }

        try {
            nv = new niivue.Niivue({
                show3D: true,
                backColor: [0, 0, 0, 1],
                multiplanarLayout: 1 // 4분할 강제
            });
            nv.attachTo('gl');
            nv.setSliceType(niivue.SLICE_TYPE.MULTIPLANAR);
            status.innerText = "준비 완료! .nii 파일을 선택해 주세요.";
        } catch (e) {
            status.innerText = "엔진 에러: " + e.message;
        }
    }

    // 파일 업로드 이벤트
    document.getElementById('file-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !nv) return;
        const status = document.getElementById('status');
        status.innerText = "파일 읽는 중: " + file.name;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            try {
                await nv.loadVolumes([{ url: file.name, data: ev.target.result }]);
                status.innerText = "성공! 휠을 돌려 단면을 확인하세요.";
            } catch (err) { status.innerText = "로딩 에러: " + err.message; }
        };
        reader.readAsArrayBuffer(file);
    };

    // 2초 뒤에 실행 (라이브러리가 로드될 시간 확보)
    setTimeout(startEngine, 1500);
</script>

</body>
</html>
