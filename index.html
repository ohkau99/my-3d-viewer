<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>MedNeuro3D</title>

  <!--
    Three.js 추가 모듈이 내부에서 "three"를 찾을 수 있도록 지정한다.
  -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000000;
      color: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #toolbar {
      height: 64px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: #111827;
      border-bottom: 1px solid #273244;
    }

    #title {
      margin-right: 12px;
      color: #22d3ee;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .button {
      height: 38px;
      padding: 0 18px;
      border: 1px solid #0891b2;
      border-radius: 6px;
      background: #06b6d4;
      color: #001018;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .button:hover {
      background: #22d3ee;
    }

    .button:disabled {
      border-color: #4b5563;
      background: #374151;
      color: #9ca3af;
      cursor: default;
    }

    #file-input {
      display: none;
    }

    #status {
      margin-left: auto;
      color: #a5f3fc;
      font-size: 13px;
    }

    #viewer-area {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: #000000;
    }

    #niivue-canvas {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      background: #000000;
    }

    /*
      Niivue 2×2 화면의 오른쪽 아래 부분을 덮는 영역
    */
    #lesion-panel {
      position: absolute;
      left: 50%;
      top: 50%;
      right: 0;
      bottom: 0;
      z-index: 10;
      overflow: hidden;
      background: #000000;
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-left: 1px solid rgba(255, 255, 255, 0.12);
    }

    #lesion-panel.model-loaded {
      cursor: pointer;
    }

    #three-canvas {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      visibility: hidden;
      background: #000000;
    }

    #lesion-panel.model-loaded #three-canvas {
      visibility: visible;
    }

    /*
      10초 진행 바
    */
    #progress-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000000;
    }

    #progress-overlay.active {
      display: flex;
    }

    #progress-track {
      width: 68%;
      max-width: 430px;
      height: 10px;
      overflow: hidden;
      background: #1f2937;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 999px;
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        #0891b2,
        #22d3ee,
        #67e8f9
      );
      box-shadow: 0 0 14px rgba(34, 211, 238, 0.9);
    }

    /*
      확대 팝업
    */
    #popup {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.9);
    }

    #popup.active {
      display: flex;
    }

    #popup-content {
      position: relative;
      width: 92vw;
      height: 88vh;
      max-width: 1300px;
      max-height: 900px;
      overflow: hidden;
      background: #000000;
      border: 1px solid #374151;
      border-radius: 10px;
      box-shadow: 0 25px 80px rgba(0, 0, 0, 0.8);
    }

    #popup-viewer {
      position: absolute;
      inset: 0;
      background: #000000;
    }

    #popup-close {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 1010;
      width: 42px;
      height: 42px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      background: rgba(17, 24, 39, 0.9);
      color: #ffffff;
      font-size: 27px;
      line-height: 38px;
      cursor: pointer;
    }

    #popup-close:hover {
      background: #374151;
    }

    @media (max-width: 800px) {
      #toolbar {
        height: auto;
        min-height: 64px;
        flex-wrap: wrap;
        padding: 10px;
      }

      #title {
        width: 100%;
      }

      #status {
        width: 100%;
        margin-left: 0;
      }
    }
  </style>
</head>

<body>
  <header id="toolbar">
    <div id="title">
      MED-NEURO 3D
    </div>

    <label
      class="button"
      for="file-input"
    >
      Upload MRI
    </label>

    <input
      id="file-input"
      type="file"
      accept=".nii,.nii.gz,.gz"
    />

    <button
      id="generate-button"
      class="button"
      type="button"
      disabled
    >
      Generate 3D
    </button>

    <div id="status">
      Initializing viewer...
    </div>
  </header>

  <main id="viewer-area">
    <canvas id="niivue-canvas"></canvas>

    <section id="lesion-panel">
      <canvas id="three-canvas"></canvas>

      <div id="progress-overlay">
        <div id="progress-track">
          <div id="progress-bar"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="popup">
    <div id="popup-content">
      <div id="popup-viewer"></div>

      <button
        id="popup-close"
        type="button"
        aria-label="Close"
      >
        ×
      </button>
    </div>
  </div>

  <script type="module">
    import {
      Niivue,
      MULTIPLANAR_TYPE,
      SLICE_TYPE,
      SHOW_RENDER
    } from "https://cdn.jsdelivr.net/npm/@niivue/niivue@0.69.0/+esm";

    import * as THREE from "three";

    import {
      OrbitControls
    } from "three/addons/controls/OrbitControls.js";

    import {
      GLTFLoader
    } from "three/addons/loaders/GLTFLoader.js";

    const GLB_FILE_PATH = "./patient07.glb";
    const PROGRESS_DURATION = 10000;

    const fileInput =
      document.getElementById("file-input");

    const generateButton =
      document.getElementById("generate-button");

    const status =
      document.getElementById("status");

    const lesionPanel =
      document.getElementById("lesion-panel");

    const threeCanvas =
      document.getElementById("three-canvas");

    const progressOverlay =
      document.getElementById("progress-overlay");

    const progressBar =
      document.getElementById("progress-bar");

    const popup =
      document.getElementById("popup");

    const popupViewer =
      document.getElementById("popup-viewer");

    const popupClose =
      document.getElementById("popup-close");

    let nv = null;
    let currentObjectUrl = null;

    let mriLoaded = false;
    let modelLoaded = false;
    let isProcessing = false;
    let isPopupOpen = false;

    let lesionModel = null;

    /*
      Niivue 초기화
    */
    async function initializeNiivue() {
      try {
        nv = new Niivue({
          backColor: [0, 0, 0, 1],
          isColorbar: false,
          dragAndDropEnabled: false,
          multiplanarLayout: MULTIPLANAR_TYPE.GRID,
          multiplanarShowRender: SHOW_RENDER.NEVER,
          multiplanarEqualSize: true
        });

        await nv.attachTo("niivue-canvas");

        nv.setSliceType(
          SLICE_TYPE.MULTIPLANAR
        );

        nv.setMultiplanarLayout(
          MULTIPLANAR_TYPE.GRID
        );

        nv.opts.multiplanarShowRender =
          SHOW_RENDER.NEVER;

        nv.opts.multiplanarEqualSize =
          true;

        nv.drawScene();

        status.textContent =
          "Upload an MRI file.";
      } catch (error) {
        console.error(
          "Niivue initialization error:",
          error
        );

        status.textContent =
          "Viewer initialization failed.";
      }
    }

    /*
      Three.js 초기화
    */
    const renderer =
      new THREE.WebGLRenderer({
        canvas: threeCanvas,
        antialias: true,
        alpha: false
      });

    renderer.setPixelRatio(
      Math.min(
        window.devicePixelRatio,
        2
      )
    );

    renderer.setClearColor(
      0x000000,
      1
    );

    renderer.outputColorSpace =
      THREE.SRGBColorSpace;

    renderer.toneMapping =
      THREE.ACESFilmicToneMapping;

    renderer.toneMappingExposure =
      1.2;

    const scene =
      new THREE.Scene();

    scene.background =
      new THREE.Color(0x000000);

    const camera =
      new THREE.PerspectiveCamera(
        45,
        1,
        0.01,
        5000
      );

    camera.position.set(
      0,
      0,
      4
    );

    const controls =
      new OrbitControls(
        camera,
        renderer.domElement
      );

    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.enablePan = true;
    controls.enableZoom = true;

    scene.add(
      new THREE.AmbientLight(
        0xffffff,
        2.2
      )
    );

    const light1 =
      new THREE.DirectionalLight(
        0xffffff,
        3.2
      );

    light1.position.set(
      5,
      6,
      8
    );

    scene.add(light1);

    const light2 =
      new THREE.DirectionalLight(
        0x7dd3fc,
        1.8
      );

    light2.position.set(
      -5,
      3,
      4
    );

    scene.add(light2);

    const light3 =
      new THREE.DirectionalLight(
        0xff9aaa,
        1.1
      );

    light3.position.set(
      2,
      -4,
      -5
    );

    scene.add(light3);

    /*
      MRI 업로드
    */
    fileInput.addEventListener(
      "change",
      async event => {
        const file =
          event.target.files?.[0];

        if (!file || !nv || isProcessing) {
          return;
        }

        status.textContent =
          "Loading MRI...";

        generateButton.disabled = true;

        removeExistingModel();

        try {
          if (currentObjectUrl) {
            URL.revokeObjectURL(
              currentObjectUrl
            );

            currentObjectUrl = null;
          }

          while (
            nv.volumes &&
            nv.volumes.length > 0
          ) {
            await nv.removeVolume(
              nv.volumes[0]
            );
          }

          currentObjectUrl =
            URL.createObjectURL(file);

          await nv.loadVolumes([
            {
              url: currentObjectUrl,
              name: file.name,
              colormap: "gray",
              opacity: 1,
              visible: true
            }
          ]);

          nv.setSliceType(
            SLICE_TYPE.MULTIPLANAR
          );

          nv.setMultiplanarLayout(
            MULTIPLANAR_TYPE.GRID
          );

          nv.opts.multiplanarShowRender =
            SHOW_RENDER.NEVER;

          nv.opts.multiplanarEqualSize =
            true;

          nv.drawScene();

          mriLoaded = true;

          generateButton.disabled =
            false;

          status.textContent =
            "MRI loaded.";
        } catch (error) {
          console.error(
            "MRI loading error:",
            error
          );

          mriLoaded = false;

          generateButton.disabled =
            true;

          status.textContent =
            "MRI loading failed.";
        }
      }
    );

    /*
      Generate 3D
    */
    generateButton.addEventListener(
      "click",
      async () => {
        if (
          !mriLoaded ||
          isProcessing
        ) {
          return;
        }

        isProcessing = true;
        modelLoaded = false;

        generateButton.disabled =
          true;

        removeExistingModel();

        progressBar.style.width =
          "0%";

        progressOverlay.classList.add(
          "active"
        );

        status.textContent =
          "Processing MRI...";

        try {
          const [
            gltf
          ] = await Promise.all([
            loadGlbModel(
              GLB_FILE_PATH
            ),
            runProgressAnimation(
              PROGRESS_DURATION
            )
          ]);

          lesionModel =
            gltf.scene;

          prepareModel(
            lesionModel
          );

          scene.add(
            lesionModel
          );

          fitCameraToObject(
            lesionModel
          );

          modelLoaded = true;

          lesionPanel.classList.add(
            "model-loaded"
          );

          progressOverlay.classList.remove(
            "active"
          );

          progressBar.style.width =
            "0%";

          status.textContent =
            "3D model generated.";

          resizeThreeViewer();
        } catch (error) {
          console.error(
            "GLB loading error:",
            error
          );

          progressOverlay.classList.remove(
            "active"
          );

          progressBar.style.width =
            "0%";

          status.textContent =
            "3D generation failed. Check patient07.glb.";
        } finally {
          isProcessing = false;

          generateButton.disabled =
            false;
        }
      }
    );

    function loadGlbModel(path) {
      return new Promise(
        (resolve, reject) => {
          const loader =
            new GLTFLoader();

          loader.load(
            path,
            gltf => {
              resolve(gltf);
            },
            progress => {
              console.log(
                "GLB loading:",
                progress.loaded
              );
            },
            error => {
              reject(error);
            }
          );
        }
      );
    }

    function runProgressAnimation(
      duration
    ) {
      return new Promise(
        resolve => {
          const startTime =
            performance.now();

          function update(
            currentTime
          ) {
            const elapsed =
              currentTime - startTime;

            const ratio =
              Math.min(
                elapsed / duration,
                1
              );

            /*
              마지막으로 갈수록 약간 느려지는 진행 효과
            */
            const eased =
              1 -
              Math.pow(
                1 - ratio,
                1.7
              );

            progressBar.style.width =
              `${eased * 100}%`;

            if (ratio < 1) {
              requestAnimationFrame(
                update
              );
            } else {
              progressBar.style.width =
                "100%";

              window.setTimeout(
                resolve,
                150
              );
            }
          }

          requestAnimationFrame(
            update
          );
        }
      );
    }

    function prepareModel(model) {
      model.traverse(
        object => {
          if (!object.isMesh) {
            return;
          }

          object.castShadow = true;
          object.receiveShadow = true;

          const materials =
            Array.isArray(
              object.material
            )
              ? object.material
              : [object.material];

          materials.forEach(
            material => {
              if (!material) {
                return;
              }

              material.side =
                THREE.DoubleSide;

              material.needsUpdate =
                true;
            }
          );
        }
      );
    }

    function fitCameraToObject(object) {
      const box =
        new THREE.Box3().setFromObject(
          object
        );

      if (box.isEmpty()) {
        camera.position.set(
          0,
          0,
          4
        );

        controls.target.set(
          0,
          0,
          0
        );

        controls.update();

        return;
      }

      const center =
        box.getCenter(
          new THREE.Vector3()
        );

      const size =
        box.getSize(
          new THREE.Vector3()
        );

      object.position.sub(
        center
      );

      const maxSize =
        Math.max(
          size.x,
          size.y,
          size.z
        );

      const fov =
        camera.fov *
        Math.PI /
        180;

      let distance =
        maxSize /
        (
          2 *
          Math.tan(
            fov / 2
          )
        );

      distance *= 1.6;

      camera.position.set(
        distance * 0.45,
        distance * 0.25,
        distance
      );

      camera.near =
        Math.max(
          distance / 1000,
          0.001
        );

      camera.far =
        distance * 100;

      camera.updateProjectionMatrix();

      controls.target.set(
        0,
        0,
        0
      );

      controls.minDistance =
        distance * 0.15;

      controls.maxDistance =
        distance * 8;

      controls.update();
    }

    function removeExistingModel() {
      closePopup();

      if (lesionModel) {
        scene.remove(
          lesionModel
        );

        lesionModel.traverse(
          object => {
            if (!object.isMesh) {
              return;
            }

            if (object.geometry) {
              object.geometry.dispose();
            }

            const materials =
              Array.isArray(
                object.material
              )
                ? object.material
                : [object.material];

            materials.forEach(
              material => {
                if (material) {
                  material.dispose();
                }
              }
            );
          }
        );
      }

      lesionModel = null;
      modelLoaded = false;

      lesionPanel.classList.remove(
        "model-loaded"
      );
    }

    /*
      3D 영역 클릭 시 팝업
    */
    lesionPanel.addEventListener(
      "click",
      () => {
        if (
          !modelLoaded ||
          isProcessing
        ) {
          return;
        }

        openPopup();
      }
    );

    popupClose.addEventListener(
      "click",
      event => {
        event.stopPropagation();
        closePopup();
      }
    );

    popup.addEventListener(
      "click",
      event => {
        if (event.target === popup) {
          closePopup();
        }
      }
    );

    document.addEventListener(
      "keydown",
      event => {
        if (
          event.key === "Escape" &&
          isPopupOpen
        ) {
          closePopup();
        }
      }
    );

    function openPopup() {
      if (
        !modelLoaded ||
        isPopupOpen
      ) {
        return;
      }

      isPopupOpen = true;

      popup.classList.add(
        "active"
      );

      popupViewer.appendChild(
        threeCanvas
      );

      window.setTimeout(
        resizeThreeViewer,
        50
      );
    }

    function closePopup() {
      if (
        threeCanvas.parentElement !==
        lesionPanel
      ) {
        lesionPanel.insertBefore(
          threeCanvas,
          progressOverlay
        );
      }

      isPopupOpen = false;

      popup.classList.remove(
        "active"
      );

      window.setTimeout(
        resizeThreeViewer,
        30
      );
    }

    function resizeThreeViewer() {
      const parent =
        threeCanvas.parentElement;

      if (!parent) {
        return;
      }

      const width =
        parent.clientWidth;

      const height =
        parent.clientHeight;

      if (
        width < 1 ||
        height < 1
      ) {
        return;
      }

      renderer.setSize(
        width,
        height,
        false
      );

      camera.aspect =
        width / height;

      camera.updateProjectionMatrix();
    }

    function animate() {
      requestAnimationFrame(
        animate
      );

      controls.update();

      renderer.render(
        scene,
        camera
      );
    }

    window.addEventListener(
      "resize",
      () => {
        if (nv) {
          nv.resizeListener();
        }

        resizeThreeViewer();
      }
    );

    /*
      실행 시작
    */
    initializeNiivue();

    animate();

    requestAnimationFrame(
      () => {
        resizeThreeViewer();
      }
    );
  </script>
</body>
</html>
