<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>MedNeuro3D</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
      }
    }
  </script>

  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }

    #viewer-container {
      position: relative;
      width: 100vw;
      height: calc(100vh - 64px);
      overflow: hidden;
      background: #000;
    }

    #nifti-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    /*
      Covers the lower-right quarter of the Niivue grid.
      It is completely empty and black before the GLB is loaded.
    */
    #lesion-panel {
      position: absolute;
      right: 0;
      bottom: 0;
      width: 50%;
      height: 50%;
      z-index: 20;
      overflow: hidden;
      box-sizing: border-box;
      background: #000;
      border-top: 1px solid #333;
      border-left: 1px solid #333;
    }

    #lesion-panel.model-loaded {
      cursor: pointer;
    }

    #lesion-viewer {
      width: 100%;
      height: 100%;
      display: block;
      background: #000;
    }

    /*
      Full-screen popup.
    */
    #popup-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 32px;
      box-sizing: border-box;
      background: rgba(0, 0, 0, 0.88);
    }

    #popup-overlay.open {
      display: flex;
    }

    #popup-content {
      position: relative;
      width: min(1200px, 92vw);
      height: min(850px, 88vh);
      overflow: hidden;
      background: #000;
      border: 1px solid #333;
      border-radius: 8px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.8);
    }

    #popup-close {
      position: absolute;
      top: 12px;
      right: 14px;
      z-index: 1010;
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 50%;
      background: rgba(30, 30, 30, 0.85);
      color: #fff;
      font-size: 25px;
      line-height: 38px;
      cursor: pointer;
    }

    #popup-close:hover {
      background: rgba(70, 70, 70, 0.95);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.4;
    }
  </style>
</head>

<body>
  <header
    class="h-16 bg-[#111] border-b border-gray-800 flex items-center px-6 gap-3"
  >
    <h1
      class="text-cyan-500 font-black text-xl tracking-tighter mr-3"
    >
      MED-NEURO 3D
    </h1>

    <label
      class="bg-cyan-500 text-black px-4 py-2 rounded font-bold text-sm
             cursor-pointer hover:bg-cyan-400"
    >
      Upload MRI

      <input
        type="file"
        id="nifti-input"
        class="hidden"
        accept=".nii,.nii.gz,.gz"
      />
    </label>

    <button
      id="generate-button"
      type="button"
      class="bg-purple-500 text-white px-4 py-2 rounded font-bold text-sm
             hover:bg-purple-400"
      disabled
    >
      Generate 3D
    </button>

    <div
      id="status"
      class="ml-auto text-xs font-mono text-cyan-300"
    >
      Initializing viewer...
    </div>
  </header>

  <main id="viewer-container">
    <canvas id="nifti-viewer"></canvas>

    <!-- Empty black area before GLB loading -->
    <section id="lesion-panel">
      <canvas id="lesion-viewer"></canvas>
    </section>
  </main>

  <!-- Enlarged 3D popup -->
  <div id="popup-overlay">
    <div id="popup-content">
      <button
        id="popup-close"
        type="button"
        aria-label="Close"
      >
        ×
      </button>
    </div>
  </div>

  <script type="module">
    import {
      Niivue,
      MULTIPLANAR_TYPE,
      SLICE_TYPE,
      SHOW_RENDER
    } from "https://cdn.jsdelivr.net/npm/@niivue/niivue@0.69.0/+esm";

    import * as THREE from "three";

    import { OrbitControls }
      from "three/addons/controls/OrbitControls.js";

    import { GLTFLoader }
      from "three/addons/loaders/GLTFLoader.js";

    /*
      patient07.glb must be in the same folder as index.html.
    */
    const GLB_FILE_PATH = "./patient07.glb";

    let nv = null;
    let niftiObjectUrl = null;
    let mriLoaded = false;

    let scene = null;
    let camera = null;
    let renderer = null;
    let controls = null;
    let lesionModel = null;
    let modelLoaded = false;

    let pointerStartX = 0;
    let pointerStartY = 0;

    const niftiInput =
      document.getElementById("nifti-input");

    const generateButton =
      document.getElementById("generate-button");

    const status =
      document.getElementById("status");

    const lesionPanel =
      document.getElementById("lesion-panel");

    const lesionCanvas =
      document.getElementById("lesion-viewer");

    const popupOverlay =
      document.getElementById("popup-overlay");

    const popupContent =
      document.getElementById("popup-content");

    const popupClose =
      document.getElementById("popup-close");

    async function initializeNiftiViewer() {
      try {
        nv = new Niivue({
          backColor: [0, 0, 0, 1],
          isColorbar: false,
          dragAndDropEnabled: false,
          multiplanarLayout: MULTIPLANAR_TYPE.GRID,
          multiplanarShowRender: SHOW_RENDER.ALWAYS,
          multiplanarEqualSize: true
        });

        await nv.attachTo("nifti-viewer");

        nv.setSliceType(
          SLICE_TYPE.MULTIPLANAR
        );

        nv.setMultiplanarLayout(
          MULTIPLANAR_TYPE.GRID
        );

        nv.opts.multiplanarShowRender =
          SHOW_RENDER.ALWAYS;

        nv.opts.multiplanarEqualSize =
          true;

        nv.drawScene();

        status.textContent =
          "Ready. Upload a NIfTI MRI file.";
      } catch (error) {
        console.error(error);

        status.textContent =
          `MRI viewer initialization failed: ${error.message}`;
      }
    }

    function initializeLesionViewer() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x000000);

      camera = new THREE.PerspectiveCamera(
        40,
        1,
        0.001,
        100000
      );

      camera.position.set(0, 0, 5);

      renderer = new THREE.WebGLRenderer({
        canvas: lesionCanvas,
        antialias: true,
        alpha: false
      });

      renderer.setPixelRatio(
        Math.min(window.devicePixelRatio, 2)
      );

      renderer.outputColorSpace =
        THREE.SRGBColorSpace;

      renderer.toneMapping =
        THREE.ACESFilmicToneMapping;

      renderer.toneMappingExposure =
        1.1;

      controls = new OrbitControls(
        camera,
        renderer.domElement
      );

      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.enableRotate = true;
      controls.enableZoom = true;
      controls.enablePan = true;

      const hemisphereLight =
        new THREE.HemisphereLight(
          0xffffff,
          0x202020,
          2.2
        );

      scene.add(hemisphereLight);

      const frontLight =
        new THREE.DirectionalLight(
          0xffffff,
          3
        );

      frontLight.position.set(3, 4, 5);
      scene.add(frontLight);

      const sideLight =
        new THREE.DirectionalLight(
          0x88ccff,
          1.8
        );

      sideLight.position.set(-4, 2, 2);
      scene.add(sideLight);

      const rearLight =
        new THREE.DirectionalLight(
          0xffffff,
          1.4
        );

      rearLight.position.set(0, -3, -5);
      scene.add(rearLight);

      resizeLesionViewer();
      animate();
    }

    async function clearNiftiVolumes() {
      if (!nv) {
        return;
      }

      while (nv.volumes.length > 0) {
        await nv.removeVolume(
          nv.volumes[0]
        );
      }
    }

    async function loadNiftiFile(file) {
      if (!file || !nv) {
        return;
      }

      mriLoaded = false;
      generateButton.disabled = true;

      status.textContent =
        `Loading MRI: ${file.name}`;

      try {
        await clearNiftiVolumes();

        if (niftiObjectUrl) {
          URL.revokeObjectURL(
            niftiObjectUrl
          );
        }

        niftiObjectUrl =
          URL.createObjectURL(file);

        await nv.loadVolumes([
          {
            url: niftiObjectUrl,
            name: file.name,
            colormap: "gray",
            opacity: 1,
            visible: true
          }
        ]);

        nv.setSliceType(
          SLICE_TYPE.MULTIPLANAR
        );

        nv.setMultiplanarLayout(
          MULTIPLANAR_TYPE.GRID
        );

        nv.opts.multiplanarShowRender =
          SHOW_RENDER.ALWAYS;

        nv.opts.multiplanarEqualSize =
          true;

        nv.setOpacity(0, 1);
        nv.drawScene();

        /*
          Return the lower-right area to an empty black state
          when a new MRI is uploaded.
        */
        removeExistingLesionModel();

        modelLoaded = false;

        lesionPanel.classList.remove(
          "model-loaded"
        );

        closePopup();

        mriLoaded = true;
        generateButton.disabled = false;
        generateButton.textContent =
          "Generate 3D";

        status.textContent =
          `MRI loaded successfully: ${file.name}`;
      } catch (error) {
        console.error(error);

        mriLoaded = false;
        generateButton.disabled = true;

        status.textContent =
          `MRI loading failed: ${error.message}`;
      }
    }

    async function generate3DLesion() {
      if (!mriLoaded) {
        status.textContent =
          "Upload an MRI file first.";

        return;
      }

      generateButton.disabled = true;
      generateButton.textContent =
        "Generating...";

      status.textContent =
        "Analyzing MRI and generating 3D model...";

      await delay(900);

      removeExistingLesionModel();

      const loader =
        new GLTFLoader();

      loader.load(
        GLB_FILE_PATH,

        gltf => {
          lesionModel =
            gltf.scene;

          lesionModel.traverse(
            object => {
              if (!object.isMesh) {
                return;
              }

              object.castShadow = true;
              object.receiveShadow = true;

              const materials =
                Array.isArray(object.material)
                  ? object.material
                  : [object.material];

              materials.forEach(
                material => {
                  if (!material) {
                    return;
                  }

                  material.side =
                    THREE.DoubleSide;

                  material.needsUpdate =
                    true;
                }
              );
            }
          );

          scene.add(lesionModel);

          fitCameraToObject(
            lesionModel
          );

          modelLoaded = true;

          lesionPanel.classList.add(
            "model-loaded"
          );

          generateButton.disabled = false;
          generateButton.textContent =
            "Generate 3D";

          status.textContent =
            "3D model generated successfully.";
        },

        undefined,

        error => {
          console.error(error);

          modelLoaded = false;

          generateButton.disabled = false;
          generateButton.textContent =
            "Generate 3D";

          status.textContent =
            "3D generation failed. Check patient07.glb.";
        }
      );
    }

    function removeExistingLesionModel() {
      if (!lesionModel || !scene) {
        return;
      }

      scene.remove(
        lesionModel
      );

      lesionModel.traverse(
        object => {
          if (!object.isMesh) {
            return;
          }

          if (object.geometry) {
            object.geometry.dispose();
          }

          const materials =
            Array.isArray(object.material)
              ? object.material
              : [object.material];

          materials.forEach(
            material => {
              if (!material) {
                return;
              }

              if (material.map) {
                material.map.dispose();
              }

              if (material.normalMap) {
                material.normalMap.dispose();
              }

              if (material.roughnessMap) {
                material.roughnessMap.dispose();
              }

              if (material.metalnessMap) {
                material.metalnessMap.dispose();
              }

              material.dispose();
            }
          );
        }
      );

      lesionModel = null;
      modelLoaded = false;
    }

    function fitCameraToObject(object) {
      const initialBox =
        new THREE.Box3().setFromObject(
          object
        );

      const center =
        initialBox.getCenter(
          new THREE.Vector3()
        );

      object.position.x -= center.x;
      object.position.y -= center.y;
      object.position.z -= center.z;

      const box =
        new THREE.Box3().setFromObject(
          object
        );

      const size =
        box.getSize(
          new THREE.Vector3()
        );

      const maxDimension =
        Math.max(
          size.x,
          size.y,
          size.z
        );

      if (
        !Number.isFinite(maxDimension) ||
        maxDimension <= 0
      ) {
        camera.position.set(0, 0, 5);
        controls.target.set(0, 0, 0);
        controls.update();
        return;
      }

      const verticalFov =
        THREE.MathUtils.degToRad(
          camera.fov
        );

      const horizontalFov =
        2 *
        Math.atan(
          Math.tan(verticalFov / 2) *
          camera.aspect
        );

      const distanceForHeight =
        size.y /
        (
          2 *
          Math.tan(verticalFov / 2)
        );

      const distanceForWidth =
        size.x /
        (
          2 *
          Math.tan(horizontalFov / 2)
        );

      const distance =
        Math.max(
          distanceForHeight,
          distanceForWidth,
          maxDimension
        ) * 1.35;

      camera.position.set(
        distance * 0.45,
        distance * 0.25,
        distance
      );

      camera.near =
        Math.max(
          distance / 1000,
          0.0001
        );

      camera.far =
        distance * 100;

      camera.updateProjectionMatrix();

      controls.target.set(0, 0, 0);
      controls.minDistance =
        distance * 0.05;

      controls.maxDistance =
        distance * 10;

      controls.update();
    }

    /*
      Move the existing Three.js canvas into the popup.
    */
    function openPopup() {
      if (!modelLoaded) {
        return;
      }

      popupContent.appendChild(
        lesionCanvas
      );

      popupOverlay.classList.add(
        "open"
      );

      window.setTimeout(
        resizeLesionViewer,
        30
      );
    }

    /*
      Return the Three.js canvas to the lower-right panel.
    */
    function closePopup() {
      if (
        lesionCanvas.parentElement !==
        lesionPanel
      ) {
        lesionPanel.appendChild(
          lesionCanvas
        );
      }

      popupOverlay.classList.remove(
        "open"
      );

      window.setTimeout(
        resizeLesionViewer,
        30
      );
    }

    function resizeLesionViewer() {
      if (!renderer || !camera) {
        return;
      }

      const parent =
        lesionCanvas.parentElement;

      if (!parent) {
        return;
      }

      const width =
        parent.clientWidth;

      const height =
        parent.clientHeight;

      if (
        width <= 0 ||
        height <= 0
      ) {
        return;
      }

      renderer.setSize(
        width,
        height,
        false
      );

      camera.aspect =
        width / height;

      camera.updateProjectionMatrix();
    }

    function resizeNiftiViewer() {
      if (!nv) {
        return;
      }

      nv.resizeListener();
      nv.drawScene();
    }

    function animate() {
      requestAnimationFrame(
        animate
      );

      if (controls) {
        controls.update();
      }

      if (
        renderer &&
        scene &&
        camera
      ) {
        renderer.render(
          scene,
          camera
        );
      }
    }

    function delay(milliseconds) {
      return new Promise(
        resolve => {
          window.setTimeout(
            resolve,
            milliseconds
          );
        }
      );
    }

    niftiInput.addEventListener(
      "change",
      async event => {
        const file =
          event.target.files[0];

        if (!file) {
          return;
        }

        await loadNiftiFile(
          file
        );

        event.target.value = "";
      }
    );

    generateButton.addEventListener(
      "click",
      generate3DLesion
    );

    /*
      Distinguish a short click from dragging the 3D model.
      Dragging rotates the model.
      A short click opens the popup.
    */
    lesionCanvas.addEventListener(
      "pointerdown",
      event => {
        pointerStartX =
          event.clientX;

        pointerStartY =
          event.clientY;
      }
    );

    lesionCanvas.addEventListener(
      "pointerup",
      event => {
        if (!modelLoaded) {
          return;
        }

        if (
          popupOverlay.classList.contains(
            "open"
          )
        ) {
          return;
        }

        const distance =
          Math.hypot(
            event.clientX - pointerStartX,
            event.clientY - pointerStartY
          );

        if (distance < 5) {
          openPopup();
        }
      }
    );

    popupClose.addEventListener(
      "click",
      closePopup
    );

    popupOverlay.addEventListener(
      "click",
      event => {
        if (
          event.target ===
          popupOverlay
        ) {
          closePopup();
        }
      }
    );

    window.addEventListener(
      "keydown",
      event => {
        if (event.key === "Escape") {
          closePopup();
        }
      }
    );

    window.addEventListener(
      "resize",
      () => {
        resizeNiftiViewer();
        resizeLesionViewer();
      }
    );

    window.addEventListener(
      "beforeunload",
      () => {
        if (niftiObjectUrl) {
          URL.revokeObjectURL(
            niftiObjectUrl
          );
        }

        removeExistingLesionModel();
      }
    );

    window.addEventListener(
      "load",
      async () => {
        initializeLesionViewer();
        await initializeNiftiViewer();
      }
    );
  </script>
</body>
</html>
