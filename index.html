<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>MRI 3D Viewer</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #05070a;
      font-family: Arial, Helvetica, sans-serif;
      color: #ffffff;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #toolbar {
      height: 64px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: #111827;
      border-bottom: 1px solid #263244;
    }

    .toolbar-button {
      height: 38px;
      padding: 0 18px;
      border: 1px solid #3b82f6;
      border-radius: 6px;
      background: #2563eb;
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .toolbar-button:hover {
      background: #1d4ed8;
    }

    .toolbar-button:disabled {
      border-color: #4b5563;
      background: #374151;
      color: #9ca3af;
      cursor: default;
    }

    #mri-input {
      display: none;
    }

    #status {
      margin-left: auto;
      color: #aeb8c7;
      font-size: 13px;
    }

    #viewer-area {
      position: relative;
      flex: 1;
      min-height: 0;
      background: #000000;
    }

    #niivue {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      background: #000000;
    }

    /*
      Niivue의 2 x 2 화면에서 오른쪽 아래 영역을
      별도의 3D 화면으로 덮는다.
    */
    #lesion-panel {
      position: absolute;
      left: 50%;
      top: 50%;
      right: 0;
      bottom: 0;
      overflow: hidden;
      background: #000000;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      cursor: default;
      z-index: 10;
    }

    #lesion-panel.model-loaded {
      cursor: pointer;
    }

    #lesion-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      visibility: hidden;
      background: #000000;
    }

    #lesion-panel.model-loaded #lesion-canvas {
      visibility: visible;
    }

    /*
      10초 동안 표시되는 처리 진행 바
    */
    #progress-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000000;
      pointer-events: none;
    }

    #progress-overlay.active {
      display: flex;
    }

    #progress-track {
      width: 68%;
      max-width: 420px;
      height: 9px;
      overflow: hidden;
      background: #202735;
      border-radius: 999px;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.08),
        0 0 18px rgba(59, 130, 246, 0.12);
    }

    #progress-bar {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        #2563eb,
        #38bdf8,
        #67e8f9
      );
      box-shadow: 0 0 12px rgba(56, 189, 248, 0.9);
    }

    /*
      3D 확대 팝업
    */
    #popup {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.88);
      backdrop-filter: blur(4px);
    }

    #popup.active {
      display: flex;
    }

    #popup-content {
      position: relative;
      width: min(92vw, 1200px);
      height: min(88vh, 850px);
      overflow: hidden;
      background: #000000;
      border: 1px solid #364152;
      border-radius: 10px;
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.7);
    }

    #popup-viewer {
      position: absolute;
      inset: 0;
      background: #000000;
    }

    #popup-close {
      position: absolute;
      top: 14px;
      right: 14px;
      z-index: 1010;
      width: 40px;
      height: 40px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 50%;
      background: rgba(17, 24, 39, 0.85);
      color: #ffffff;
      font-size: 25px;
      line-height: 38px;
      text-align: center;
      cursor: pointer;
    }

    #popup-close:hover {
      background: rgba(55, 65, 81, 0.95);
    }

    @media (max-width: 700px) {
      #toolbar {
        height: auto;
        min-height: 64px;
        flex-wrap: wrap;
        padding: 10px;
      }

      #status {
        width: 100%;
        margin-left: 0;
      }
    }
  </style>
</head>

<body>
  <header id="toolbar">
    <label class="toolbar-button" for="mri-input">
      Upload MRI
    </label>

    <input
      id="mri-input"
      type="file"
      accept=".nii,.nii.gz,.hdr,.img"
    />

    <button
      id="generate-button"
      class="toolbar-button"
      type="button"
      disabled
    >
      Generate 3D
    </button>

    <div id="status">
      Upload an MRI file.
    </div>
  </header>

  <main id="viewer-area">
    <canvas id="niivue"></canvas>

    <section id="lesion-panel">
      <canvas id="lesion-canvas"></canvas>

      <div id="progress-overlay">
        <div id="progress-track">
          <div id="progress-bar"></div>
        </div>
      </div>
    </section>
  </main>

  <div id="popup">
    <div id="popup-content">
      <div id="popup-viewer"></div>

      <button
        id="popup-close"
        type="button"
        aria-label="Close"
      >
        ×
      </button>
    </div>
  </div>

  <script type="module">
    import {
      Niivue
    } from "https://unpkg.com/@niivue/niivue@0.57.0/dist/index.js";

    import * as THREE
      from "https://unpkg.com/three@0.160.0/build/three.module.js";

    import {
      OrbitControls
    } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";

    import {
      GLTFLoader
    } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js";

    const GLB_FILE_PATH = "./patient07.glb";
    const PROGRESS_DURATION = 10000;

    const mriInput =
      document.getElementById("mri-input");

    const generateButton =
      document.getElementById("generate-button");

    const status =
      document.getElementById("status");

    const lesionPanel =
      document.getElementById("lesion-panel");

    const lesionCanvas =
      document.getElementById("lesion-canvas");

    const progressOverlay =
      document.getElementById("progress-overlay");

    const progressBar =
      document.getElementById("progress-bar");

    const popup =
      document.getElementById("popup");

    const popupContent =
      document.getElementById("popup-content");

    const popupViewer =
      document.getElementById("popup-viewer");

    const popupClose =
      document.getElementById("popup-close");

    let mriLoaded = false;
    let modelLoaded = false;
    let isProcessing = false;
    let isPopupOpen = false;

    let lesionModel = null;
    let animationFrameId = null;

    /*
      Niivue 설정
    */
    const nv = new Niivue({
      backColor: [0, 0, 0, 1],
      show3Dcrosshair: true,
      isRadiologicalConvention: false,
      dragAndDropEnabled: false
    });

    await nv.attachToCanvas(
      document.getElementById("niivue")
    );

    /*
      2 x 2 다중 평면 표시
    */
    nv.setSliceType(
      nv.sliceTypeMultiplanar
    );

    /*
      Three.js 설정
    */
    const renderer = new THREE.WebGLRenderer({
      canvas: lesionCanvas,
      antialias: true,
      alpha: false
    });

    renderer.setPixelRatio(
      Math.min(window.devicePixelRatio, 2)
    );

    renderer.setClearColor(
      0x000000,
      1
    );

    renderer.outputColorSpace =
      THREE.SRGBColorSpace;

    renderer.toneMapping =
      THREE.ACESFilmicToneMapping;

    renderer.toneMappingExposure =
      1.15;

    const scene =
      new THREE.Scene();

    scene.background =
      new THREE.Color(0x000000);

    const camera =
      new THREE.PerspectiveCamera(
        45,
        1,
        0.01,
        2000
      );

    camera.position.set(
      0,
      0,
      4
    );

    const controls =
      new OrbitControls(
        camera,
        renderer.domElement
      );

    controls.enableDamping = true;
    controls.dampingFactor = 0.07;
    controls.enablePan = true;
    controls.enableZoom = true;
    controls.rotateSpeed = 0.7;
    controls.zoomSpeed = 0.8;

    const ambientLight =
      new THREE.AmbientLight(
        0xffffff,
        1.8
      );

    scene.add(
      ambientLight
    );

    const mainLight =
      new THREE.DirectionalLight(
        0xffffff,
        3.2
      );

    mainLight.position.set(
      4,
      5,
      6
    );

    scene.add(
      mainLight
    );

    const fillLight =
      new THREE.DirectionalLight(
        0x8ec5ff,
        1.8
      );

    fillLight.position.set(
      -5,
      2,
      3
    );

    scene.add(
      fillLight
    );

    const backLight =
      new THREE.DirectionalLight(
        0xff8ea1,
        1.1
      );

    backLight.position.set(
      1,
      -3,
      -5
    );

    scene.add(
      backLight
    );

    /*
      MRI 파일 업로드
    */
    mriInput.addEventListener(
      "change",
      async event => {
        const file =
          event.target.files?.[0];

        if (!file) {
          return;
        }

        if (isProcessing) {
          return;
        }

        status.textContent =
          "Loading MRI...";

        generateButton.disabled = true;

        removeExistingModel();

        try {
          const objectUrl =
            URL.createObjectURL(file);

          await nv.loadVolumes([
            {
              url: objectUrl,
              name: file.name
            }
          ]);

          nv.setSliceType(
            nv.sliceTypeMultiplanar
          );

          mriLoaded = true;

          generateButton.disabled = false;

          status.textContent =
            "MRI loaded.";

          window.setTimeout(
            () => {
              URL.revokeObjectURL(
                objectUrl
              );
            },
            3000
          );
        } catch (error) {
          console.error(error);

          mriLoaded = false;
          generateButton.disabled = true;

          status.textContent =
            "MRI loading failed.";
        }
      }
    );

    /*
      Generate 3D 클릭
    */
    generateButton.addEventListener(
      "click",
      async () => {
        if (!mriLoaded || isProcessing) {
          return;
        }

        isProcessing = true;
        modelLoaded = false;

        generateButton.disabled = true;

        removeExistingModel();

        progressBar.style.width =
          "0%";

        progressOverlay.classList.add(
          "active"
        );

        status.textContent =
          "Processing MRI...";

        try {
          /*
            GLB 로딩과 10초 진행 효과를 동시에 시작한다.

            GLB가 먼저 로딩되어도 10초가 지나야 나타난다.
            GLB 로딩이 10초보다 오래 걸리면 로딩이 끝날 때까지 기다린다.
          */
          const [
            gltf
          ] = await Promise.all([
            loadGlbModel(
              GLB_FILE_PATH
            ),
            runProgressAnimation(
              PROGRESS_DURATION
            )
          ]);

          lesionModel =
            gltf.scene;

          prepareModel(
            lesionModel
          );

          scene.add(
            lesionModel
          );

          fitCameraToObject(
            lesionModel
          );

          modelLoaded = true;

          lesionPanel.classList.add(
            "model-loaded"
          );

          progressOverlay.classList.remove(
            "active"
          );

          progressBar.style.width =
            "0%";

          status.textContent =
            "3D model generated.";
        } catch (error) {
          console.error(error);

          progressOverlay.classList.remove(
            "active"
          );

          progressBar.style.width =
            "0%";

          status.textContent =
            "3D generation failed. Check patient07.glb.";
        } finally {
          isProcessing = false;
          generateButton.disabled = false;

          resizeThreeViewer();
        }
      }
    );

    /*
      오른쪽 아래 3D 영역 클릭 시 확대
    */
    lesionPanel.addEventListener(
      "click",
      event => {
        if (
          !modelLoaded ||
          isProcessing
        ) {
          return;
        }

        if (
          event.target.closest(
            "#progress-overlay"
          )
        ) {
          return;
        }

        openPopup();
      }
    );

    popupClose.addEventListener(
      "click",
      event => {
        event.stopPropagation();
        closePopup();
      }
    );

    popup.addEventListener(
      "click",
      event => {
        if (event.target === popup) {
          closePopup();
        }
      }
    );

    document.addEventListener(
      "keydown",
      event => {
        if (
          event.key === "Escape" &&
          isPopupOpen
        ) {
          closePopup();
        }
      }
    );

    function loadGlbModel(path) {
      return new Promise(
        (resolve, reject) => {
          const loader =
            new GLTFLoader();

          loader.load(
            path,
            gltf => {
              resolve(gltf);
            },
            undefined,
            error => {
              reject(error);
            }
          );
        }
      );
    }

    function runProgressAnimation(
      duration
    ) {
      return new Promise(
        resolve => {
          const startTime =
            performance.now();

          function update(
            currentTime
          ) {
            const elapsed =
              currentTime - startTime;

            const linearProgress =
              Math.min(
                elapsed / duration,
                1
              );

            /*
              처음에는 비교적 빠르게 진행되고
              마지막 부분에서 약간 느려지는 효과
            */
            const easedProgress =
              1 -
              Math.pow(
                1 - linearProgress,
                1.65
              );

            const percent =
              Math.min(
                easedProgress * 100,
                100
              );

            progressBar.style.width =
              `${percent}%`;

            if (linearProgress < 1) {
              requestAnimationFrame(
                update
              );
            } else {
              progressBar.style.width =
                "100%";

              window.setTimeout(
                resolve,
                180
              );
            }
          }

          requestAnimationFrame(
            update
          );
        }
      );
    }

    function prepareModel(model) {
      model.traverse(
        object => {
          if (!object.isMesh) {
            return;
          }

          object.castShadow = true;
          object.receiveShadow = true;

          const materials =
            Array.isArray(
              object.material
            )
              ? object.material
              : [object.material];

          materials.forEach(
            material => {
              if (!material) {
                return;
              }

              material.side =
                THREE.DoubleSide;

              material.transparent =
                material.opacity < 1;

              material.needsUpdate =
                true;
            }
          );
        }
      );
    }

    function fitCameraToObject(
      object
    ) {
      const box =
        new THREE.Box3().setFromObject(
          object
        );

      if (box.isEmpty()) {
        camera.position.set(
          0,
          0,
          4
        );

        controls.target.set(
          0,
          0,
          0
        );

        controls.update();
        return;
      }

      const center =
        box.getCenter(
          new THREE.Vector3()
        );

      const size =
        box.getSize(
          new THREE.Vector3()
        );

      const maxDimension =
        Math.max(
          size.x,
          size.y,
          size.z
        );

      /*
        모델 중심을 원점으로 이동
      */
      object.position.sub(
        center
      );

      const fieldOfView =
        camera.fov *
        (Math.PI / 180);

      let cameraDistance =
        Math.abs(
          maxDimension /
          (2 * Math.tan(fieldOfView / 2))
        );

      cameraDistance *= 1.55;

      camera.position.set(
        cameraDistance * 0.45,
        cameraDistance * 0.25,
        cameraDistance
      );

      camera.near =
        Math.max(
          cameraDistance / 1000,
          0.001
        );

      camera.far =
        cameraDistance * 100;

      camera.updateProjectionMatrix();

      controls.target.set(
        0,
        0,
        0
      );

      controls.minDistance =
        cameraDistance * 0.15;

      controls.maxDistance =
        cameraDistance * 8;

      controls.update();
    }

    function removeExistingModel() {
      closePopup();

      if (lesionModel) {
        scene.remove(
          lesionModel
        );

        lesionModel.traverse(
          object => {
            if (!object.isMesh) {
              return;
            }

            if (object.geometry) {
              object.geometry.dispose();
            }

            const materials =
              Array.isArray(
                object.material
              )
                ? object.material
                : [object.material];

            materials.forEach(
              material => {
                if (!material) {
                  return;
                }

                for (
                  const property
                  in material
                ) {
                  const value =
                    material[property];

                  if (
                    value &&
                    value.isTexture
                  ) {
                    value.dispose();
                  }
                }

                material.dispose();
              }
            );
          }
        );
      }

      lesionModel = null;
      modelLoaded = false;

      lesionPanel.classList.remove(
        "model-loaded"
      );
    }

    function openPopup() {
      if (
        !modelLoaded ||
        isPopupOpen
      ) {
        return;
      }

      isPopupOpen = true;

      popup.classList.add(
        "active"
      );

      /*
        같은 Three.js 캔버스를 팝업 영역으로 이동한다.
      */
      popupViewer.appendChild(
        lesionCanvas
      );

      window.setTimeout(
        resizeThreeViewer,
        30
      );
    }

    function closePopup() {
      if (!isPopupOpen) {
        /*
          캔버스 위치가 잘못되어 있을 가능성도 처리
        */
        if (
          lesionCanvas.parentElement !==
          lesionPanel
        ) {
          lesionPanel.insertBefore(
            lesionCanvas,
            progressOverlay
          );
        }

        resizeThreeViewer();
        return;
      }

      isPopupOpen = false;

      popup.classList.remove(
        "active"
      );

      lesionPanel.insertBefore(
        lesionCanvas,
        progressOverlay
      );

      window.setTimeout(
        resizeThreeViewer,
        30
      );
    }

    function resizeThreeViewer() {
      const parent =
        lesionCanvas.parentElement;

      if (!parent) {
        return;
      }

      const width =
        parent.clientWidth;

      const height =
        parent.clientHeight;

      if (
        width <= 0 ||
        height <= 0
      ) {
        return;
      }

      renderer.setSize(
        width,
        height,
        false
      );

      camera.aspect =
        width / height;

      camera.updateProjectionMatrix();
    }

    function animate() {
      animationFrameId =
        requestAnimationFrame(
          animate
        );

      controls.update();

      renderer.render(
        scene,
        camera
      );
    }

    animate();

    window.addEventListener(
      "resize",
      () => {
        nv.resizeListener();

        resizeThreeViewer();
      }
    );

    /*
      화면 초기 크기 설정
    */
    requestAnimationFrame(
      () => {
        resizeThreeViewer();
        nv.resizeListener();
      }
    );
  </script>
</body>
</html>
