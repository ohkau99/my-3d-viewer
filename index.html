<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D NIfTI Viewer</title>
    <style>
        body { margin: 0; background: #050508; color: white; font-family: sans-serif; text-align: center; }
        header { padding: 15px; background: #111; border-bottom: 1px solid #333; }
        #status { color: #00ffff; font-size: 13px; margin-top: 8px; font-family: monospace; }
        #container { width: 100vw; height: calc(100vh - 100px); }
        canvas { width: 100%; height: 100%; }
        .btn { background: #00bcd4; color: black; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

<header>
    <label class="btn">
        파일 열기 (.nii)
        <input type="file" id="file-input" style="display:none" accept=".nii,.gz">
    </label>
    <div id="status">라이브러리 로딩 중...</div>
</header>

<div id="container">
    <canvas id="gl"></canvas>
</div>

<!-- 라이브러리 주소를 더 범용적인 주소로 변경 -->
<script src="https://unpkg.com/@niivue/niivue@0.41.1/dist/niivue.umd.js"></script>

<script>
    let nv;

    // 라이브러리가 로드되었는지 확인하는 함수
    function checkLibrary() {
        if (typeof niivue !== 'undefined') {
            startEngine();
        } else {
            console.log("기다리는 중...");
            setTimeout(checkLibrary, 500); // 0.5초마다 재시도
        }
    }

    function startEngine() {
        const status = document.getElementById('status');
        try {
            nv = new niivue.Niivue({
                show3D: true,
                backColor: [0.05, 0.05, 0.05, 1],
                multiplanarLayout: 1 
            });
            nv.attachTo('gl');
            nv.setSliceType(niivue.SLICE_TYPE.MULTIPLANAR);
            status.innerText = "준비 완료! .nii 파일을 선택해 주세요.";
        } catch (e) {
            status.innerText = "엔진 시작 실패: " + e.message;
        }
    }

    // 파일 업로드 처리
    document.getElementById('file-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !nv) return;

        const status = document.getElementById('status');
        status.innerText = "파일 로드 중: " + file.name;

        const reader = new FileReader();
        reader.onload = async (event) => {
            try {
                const volumeList = [{
                    url: file.name,
                    data: event.target.result
                }];
                await nv.loadVolumes(volumeList);
                status.innerText = "로딩 성공! 휠을 돌려보세요.";
            } catch (err) {
                status.innerText = "파일 읽기 실패: " + err.message;
            }
        };
        reader.readAsArrayBuffer(file);
    };

    // 실행 시작
    checkLibrary();
</script>

</body>
</html>
