<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>3D NIfTI Viewer</title>
    <!-- 리다이렉트 없는 다이렉트 라이브러리 주소 -->
    <script src="https://cdn.jsdelivr.net/npm/@niivue/niivue@0.41.1/dist/niivue.umd.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        header { padding: 15px; background: #111; border-bottom: 1px solid #333; }
        #status { color: #00ffff; font-size: 14px; margin-top: 10px; }
        #container { width: 100vw; height: calc(100vh - 100px); }
        canvas { width: 100%; height: 100%; }
        .btn { background: #00bcd4; color: black; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; display: inline-block; text-decoration: none; }
    </style>
</head>
<body>

<header>
    <label class="btn">
        NIfTI 파일 선택 (.nii)
        <input type="file" id="file-input" style="display:none" accept=".nii,.gz">
    </label>
    <div id="status">시스템 확인 중...</div>
</header>

<div id="container">
    <canvas id="gl"></canvas>
</div>

<script>
    // 페이지가 로드되면 실행
    window.onload = function() {
        const status = document.getElementById('status');
        
        // 1. niivue 라이브러리가 로드되었는지 확인
        if (typeof niivue === 'undefined') {
            status.innerHTML = "<span style='color:red font-bold'>라이브러리 로드 실패. 브라우저를 새로고침 해주세요.</span>";
            return;
        }

        try {
            // 2. 뷰어 엔진 설정
            const nv = new niivue.Niivue({
                show3D: true,
                backColor: [0, 0, 0, 1],
                multiplanarLayout: 1 // 4분할 모드
            });

            // 3. 캔버스에 엔진 연결
            nv.attachTo('gl');
            nv.setSliceType(niivue.SLICE_TYPE.MULTIPLANAR);
            status.innerText = "준비 완료! .nii 파일을 선택해 주세요.";

            // 4. 파일 업로드 이벤트
            document.getElementById('file-input').onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                status.innerText = "파일 로딩 중: " + file.name;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        await nv.loadVolumes([{url: file.name, data: event.target.result}]);
                        status.innerText = "로딩 성공! 마우스 휠로 조작해보세요.";
                    } catch (err) {
                        status.innerText = "로딩 에러: " + err.message;
                    }
                };
                reader.readAsArrayBuffer(file);
            };
        } catch (err) {
            status.innerText = "엔진 오류: " + err.message;
        }
    };
</script>

</body>
</html>
