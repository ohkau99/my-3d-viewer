<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D NIfTI Viewer</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        header { padding: 15px; background: #111; border-bottom: 1px solid #333; }
        #status { color: #ff0; font-size: 14px; margin-top: 10px; border: 1px solid #444; padding: 10px; display: inline-block; }
        #container { width: 100vw; height: calc(100vh - 120px); }
        canvas { width: 100%; height: 100%; }
        .btn { background: #00bcd4; color: black; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; display: inline-block; }
    </style>
</head>
<body>

<header>
    <label class="btn">
        NIfTI 파일 선택
        <input type="file" id="file-input" style="display:none" accept=".nii,.gz">
    </label>
    <div id="status">라이브러리 로드 시도 중... (1/3)</div>
</header>

<div id="container">
    <canvas id="gl"></canvas>
</div>

<!-- 1번 서버 (jsDelivr - 가장 차단 안 됨) -->
<script src="https://cdn.jsdelivr.net/npm/@niivue/niivue@0.41.1/dist/niivue.umd.js" onerror="tryNext()"></script>

<script>
    let nv;
    let attempt = 1;

    // 1번 서버가 실패하면 2번, 2번이 실패하면 3번으로 시도하는 함수
    function tryNext() {
        attempt++;
        const status = document.getElementById('status');
        if (attempt === 2) {
            status.innerText = "1번 서버 실패, 2번 서버 시도 중... (2/3)";
            const script = document.createElement('script');
            script.src = "https://unpkg.com/@niivue/niivue@0.41.1/dist/niivue.umd.js";
            script.onerror = tryNext;
            document.head.appendChild(script);
        } else if (attempt === 3) {
            status.innerText = "2번 서버 실패, 3번 서버 시도 중... (3/3)";
            const script = document.createElement('script');
            script.src = "https://niivue.github.io/niivue/features/niivue.umd.js"; // 마지막 보루
            script.onerror = showFinalError;
            document.head.appendChild(script);
        }
    }

    function showFinalError() {
        document.getElementById('status').innerHTML = "<span style='color:red'>모든 서버 접속 차단됨! 네트워크 보안 설정을 확인하세요.</span>";
    }

    // 엔진 시작 (1초 뒤 확인)
    setTimeout(() => {
        if (typeof niivue !== 'undefined') {
            startEngine();
        } else {
            tryNext();
        }
    }, 1000);

    function startEngine() {
        const status = document.getElementById('status');
        try {
            nv = new niivue.Niivue({ show3D: true, multiplanarLayout: 1 });
            nv.attachTo('gl');
            nv.setSliceType(niivue.SLICE_TYPE.MULTIPLANAR);
            status.innerText = "성공! 라이브러리 연결됨. 파일을 선택하세요.";
        } catch (e) {
            status.innerText = "엔진 오류: " + e.message;
        }
    }

    document.getElementById('file-input').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file || !nv) return;
        document.getElementById('status').innerText = "파일 로딩 중: " + file.name;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            await nv.loadVolumes([{ url: file.name, data: ev.target.result }]);
            document.getElementById('status').innerText = "로딩 성공! 마우스 휠을 돌려보세요.";
        };
        reader.readAsArrayBuffer(file);
    };
</script>

</body>
</html>
